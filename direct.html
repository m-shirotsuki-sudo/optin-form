<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直入り（HP経由）成約報告 | OPT-IN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .g-btn{background:linear-gradient(90deg,#06B6D4 0%,#3B82F6 50%,#4F46E5 100%)}
    .g-badge{background:linear-gradient(135deg,#06B6D4 0%,#3B82F6 50%,#4F46E5 100%)}
    .g-bar{background:linear-gradient(90deg,#06B6D4 0%,#3B82F6 50%,#4F46E5 100%)}
    .hidden{display:none!important}
    .sel{border-color:#3B82F6!important;background-color:#eff6ff!important}
    .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:9999}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="loading" class="loading-overlay">
    <div class="text-center">
      <svg class="animate-spin h-10 w-10 mx-auto mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-gray-600">読み込み中...</p>
    </div>
  </div>

  <div class="bg-white border-b border-gray-200">
    <div class="max-w-2xl mx-auto px-4 py-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-sm g-badge">HP</div>
        <div>
          <h1 class="text-lg font-bold text-gray-900">直入り（HP経由）成約報告</h1>
          <p class="text-xs text-gray-500">UTAGE未経由のお客様用 ・ Sales Management System</p>
        </div>
      </div>
    </div>
  </div>

  <div class="bg-white border-b border-gray-100">
    <div class="max-w-2xl mx-auto px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="flex-1"><div class="h-1.5 rounded-full g-bar" id="p1"></div></div>
        <div class="flex-1"><div class="h-1.5 rounded-full bg-gray-200" id="p2"></div></div>
        <div class="flex-1"><div class="h-1.5 rounded-full bg-gray-200" id="p3"></div></div>
      </div>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-6">
    <div id="ok" class="hidden mb-6 p-5 bg-white rounded-2xl border border-emerald-200 shadow-sm">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div>
          <p class="font-semibold text-gray-900">登録完了</p>
          <p class="text-sm text-gray-500" id="okMsg">データが正常に保存されました</p>
        </div>
      </div>
      <button onclick="location.reload()" class="mt-4 w-full py-3 text-white font-medium rounded-xl g-btn hover:opacity-90">新規入力を開始</button>
    </div>

    <form id="f" class="space-y-4">

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold g-badge">1</div>
          <h2 class="font-semibold text-gray-900">お客様情報</h2>
        </div>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">お名前 <span class="text-blue-500">*</span></label>
            <input type="text" id="name" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="例：山田 太郎">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">ふりがな</label>
            <input type="text" id="furigana" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="例：やまだ たろう">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">メールアドレス <span class="text-blue-500">*</span></label>
            <input type="email" id="email" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="例：taro@example.com">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">LINE名</label>
              <input type="text" id="lineName" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="任意">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">電話番号</label>
              <input type="tel" id="phone" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="任意">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">年代</label>
            <select id="age" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
              <option value="">選択してください</option>
              <option>20代</option><option>30代</option><option>40代</option><option>50代</option><option>60代以上</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">流入経路（どのHP・経路か） <span class="text-blue-500">*</span></label>
            <input type="text" id="inflow" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="例：時創AIコーポレートサイト / 〇〇セミナー">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">担当セールス <span class="text-blue-500">*</span></label>
            <input type="text" id="sales" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="例：加治佐 卓也">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">活動拠点</label>
            <select id="actBase" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
              <option value="">選択してください</option>
              <option>北海道・東北</option><option>関東</option><option>中部</option><option>近畿</option>
              <option>中国・四国</option><option>九州・沖縄</option><option>海外</option>
            </select>
            <input type="text" id="actBaseOther" class="w-full mt-2 px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none hidden" placeholder="国名を入力">
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold g-badge">2</div>
          <h2 class="font-semibold text-gray-900">提案商品（プラン）<span class="text-blue-500">*</span></h2>
        </div>
        <div id="prds" class="space-y-2"><p class="text-sm text-gray-400">読み込み中...</p></div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold g-badge">3</div>
          <h2 class="font-semibold text-gray-900">商談結果 <span class="text-blue-500">*</span></h2>
        </div>
        <div class="grid grid-cols-2 gap-2" id="resOpts"></div>
      </div>

      <div id="secClosed" class="hidden space-y-4">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h2 class="font-semibold text-gray-900 mb-4">成約要因</h2>
          <div class="space-y-2" id="facS"></div>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h2 class="font-semibold text-gray-900 mb-4">決済手段 <span class="text-blue-500">*</span></h2>
          <div class="grid grid-cols-3 gap-2" id="payOpts"></div>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">契約日 <span class="text-blue-500">*</span></label>
            <input type="date" id="contractDate" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">締結済 契約書リンク</label>
            <input type="url" id="contractLink" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">領収書 <span class="text-blue-500">*</span></label>
            <div class="grid grid-cols-2 gap-2" id="receiptOpts"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-3">
          <h2 class="font-semibold text-gray-900">契約書の郵送</h2>
          <div class="grid grid-cols-1 gap-2" id="mailOpts"></div>
          <input type="text" id="postOffice" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none hidden" placeholder="郵便局名（局止め先）">
          <textarea id="mailAddress" rows="2" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none hidden resize-none" placeholder="〒・住所・宛名をまとめて入力"></textarea>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">追跡番号の要否</label>
            <div class="grid grid-cols-2 gap-2" id="trackOpts"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h2 class="font-semibold text-gray-900 mb-3">CS引き継ぎ事項</h2>
          <textarea id="csHandover" rows="3" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none" placeholder="任意"></textarea>
        </div>
      </div>

      <div id="secCommit" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h2 class="font-semibold text-gray-900 mb-4">言質要因</h2>
        <div class="space-y-2" id="facC"></div>
      </div>

      <div id="secConsider" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h2 class="font-semibold text-gray-900 mb-4">検討要因</h2>
        <div class="space-y-2" id="facCons"></div>
      </div>

      <div id="secLost" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h2 class="font-semibold text-gray-900 mb-4">失注要因</h2>
        <div class="space-y-2" id="facL"></div>
      </div>

      <div id="secReflection" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h2 class="font-semibold text-gray-900 mb-4">振り返り <span class="text-blue-500">*</span></h2>
        <textarea id="reflection" rows="4" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none" placeholder="商談の振り返りを入力"></textarea>
      </div>

      <button type="submit" id="subBtn" class="hidden w-full py-4 text-white font-semibold rounded-xl g-btn hover:opacity-90">登録する</button>
    </form>
  </div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbzkzn6baBEZtA0L1XpcbINXvVKvev5fHvIK9CnEfaCUFq3ms3lDdESsEw7-Usw11nce/exec';

  const factors = ['SNSスキルで独立・副業したい','実績・再現性・投資対効果','今すぐ変わりたい欲求','明確な"痛み"がある','決済のハードル低さ','講師・担当者の信頼性'];
  const lostFactors = ['金額','タイミング・環境要因','他社比較','時間を確保できない','独学でできそう','第三者相談','信販落ち','やりたいことが違う'];
  const payMethods = ['mosh','ライフティ','CBS','アスマイル','AGペイメント','銀行振込（一括）','銀行振込（２分割）','テレコム','その他'];
  const resultOpts = [['成約','closed'],['言質','commitment'],['検討中','considering'],['失注','lost']];
  const receiptOpts = ['必要','不要'];
  const mailMethods = ['局止め','契約書記載住所','その他住所'];
  const trackOpts = ['はい','いいえ'];

  const S = { prd:'', res:'', pay:'', receipt:'', mailMethod:'', track:'',
    facSuccess:[], facCommitment:[], facConsideration:[], facLost:[] };

  function facHtml(list, type){
    return list.map(f =>
      `<div class="fac flex items-center gap-3 p-3 rounded-xl cursor-pointer border-2 border-gray-100 bg-gray-50" onclick="togFac(this,'${type}','${f.replace(/'/g,"\\'")}')">
        <div class="cb w-5 h-5 rounded border-2 border-gray-300 flex items-center justify-center"><svg class="ck hidden w-3 h-3 text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
        <span class="text-sm">${f}</span></div>`).join('');
  }
  function pillHtml(list, cls, fn){
    return list.map(p => `<div class="${cls} flex items-center justify-center p-3 rounded-xl cursor-pointer border-2 border-gray-100 bg-gray-50 text-sm" onclick="${fn}(this,'${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');
  }

  document.getElementById('facS').innerHTML = facHtml(factors,'success');
  document.getElementById('facC').innerHTML = facHtml(factors,'commitment');
  document.getElementById('facCons').innerHTML = facHtml(lostFactors,'consideration');
  document.getElementById('facL').innerHTML = facHtml(lostFactors,'lost');
  document.getElementById('payOpts').innerHTML = pillHtml(payMethods,'po','selPay');
  document.getElementById('receiptOpts').innerHTML = pillHtml(receiptOpts,'ro','selReceipt');
  document.getElementById('mailOpts').innerHTML = pillHtml(mailMethods,'mo','selMail');
  document.getElementById('trackOpts').innerHTML = pillHtml(trackOpts,'to','selTrack');
  document.getElementById('resOpts').innerHTML = resultOpts.map(([label,val]) =>
    `<div class="res flex items-center justify-center p-3 rounded-xl cursor-pointer border-2 border-gray-100 bg-gray-50 text-sm font-medium" onclick="selRes(this,'${val}')">${label}</div>`).join('');

  document.getElementById('actBase').addEventListener('change', function(){
    document.getElementById('actBaseOther').classList.toggle('hidden', this.value !== '海外');
  });

  (async function loadProducts(){
    try{
      const r = await fetch(`${API}?action=getMaster`);
      const d = await r.json();
      let html = '';
      Object.entries(d.plans).forEach(([company, plans]) => {
        html += `<div class="mb-3"><p class="text-xs font-semibold text-gray-500 mb-2">${company}</p><div class="space-y-2">`;
        plans.forEach(p => {
          const amt = p.amount ? Number(p.amount).toLocaleString()+'円' : '';
          html += `<div class="prd flex items-center gap-3 p-3 rounded-xl cursor-pointer border-2 border-gray-100 bg-gray-50" onclick="selPrd(this,'${p.name.replace(/'/g,"\\'")}')">
            <div class="prdDot hidden w-3 h-3 rounded-full g-badge"></div>
            <div class="flex-1"><p class="text-sm font-medium">${p.name}</p><p class="text-xs text-gray-400">${amt}</p></div></div>`;
        });
        html += '</div></div>';
      });
      document.getElementById('prds').innerHTML = html || '<p class="text-sm text-gray-400">プランがありません</p>';
    }catch(e){
      document.getElementById('prds').innerHTML = '<p class="text-sm text-red-500">プラン読み込みエラー: '+e.message+'</p>';
    } finally {
      document.getElementById('loading').classList.add('hidden');
    }
  })();

  function selPrd(el,name){
    document.querySelectorAll('.prd').forEach(x=>{x.classList.remove('sel');x.querySelector('.prdDot').classList.add('hidden');});
    el.classList.add('sel'); el.querySelector('.prdDot').classList.remove('hidden');
    S.prd = name;
  }
  function selRes(el,val){
    document.querySelectorAll('.res').forEach(x=>x.classList.remove('sel'));
    el.classList.add('sel'); S.res = val;
    document.getElementById('secClosed').classList.toggle('hidden', val!=='closed');
    document.getElementById('secCommit').classList.toggle('hidden', val!=='commitment');
    document.getElementById('secConsider').classList.toggle('hidden', val!=='considering');
    document.getElementById('secLost').classList.toggle('hidden', val!=='lost');
    document.getElementById('secReflection').classList.remove('hidden');
    document.getElementById('subBtn').classList.remove('hidden');
    var p2=document.getElementById('p2'); p2.classList.add('g-bar'); p2.classList.remove('bg-gray-200');
    var p3=document.getElementById('p3'); p3.classList.add('g-bar'); p3.classList.remove('bg-gray-200');
  }
  function togFac(el,type,f){
    el.classList.toggle('sel');
    const on = el.classList.contains('sel');
    el.querySelector('.ck').classList.toggle('hidden', !on);
    const key = {success:'facSuccess',commitment:'facCommitment',consideration:'facConsideration',lost:'facLost'}[type];
    if(on){ if(!S[key].includes(f)) S[key].push(f); }
    else { S[key] = S[key].filter(x=>x!==f); }
  }
  function selPay(el,p){ document.querySelectorAll('.po').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); S.pay=p; }
  function selReceipt(el,p){ document.querySelectorAll('.ro').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); S.receipt=p; }
  function selTrack(el,p){ document.querySelectorAll('.to').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); S.track=p; }
  function selMail(el,p){
    document.querySelectorAll('.mo').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); S.mailMethod=p;
    document.getElementById('postOffice').classList.toggle('hidden', p!=='局止め');
    document.getElementById('mailAddress').classList.toggle('hidden', p!=='その他住所');
  }

  document.getElementById('f').addEventListener('submit', async function(e){
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const inflow = document.getElementById('inflow').value.trim();
    const sales = document.getElementById('sales').value.trim();
    const reflection = document.getElementById('reflection').value.trim();

    if(!name){ alert('お名前を入力してください'); return; }
    if(!email){ alert('メールアドレスを入力してください'); return; }
    if(!inflow){ alert('流入経路を入力してください'); return; }
    if(!sales){ alert('担当セールスを入力してください'); return; }
    if(!S.prd){ alert('提案商品を選択してください'); return; }
    if(!S.res){ alert('商談結果を選択してください'); return; }
    if(!reflection){ alert('振り返りを入力してください'); return; }
    if(S.res==='closed'){
      if(!S.pay){ alert('決済手段を選択してください'); return; }
      if(!document.getElementById('contractDate').value){ alert('契約日を入力してください'); return; }
      if(!S.receipt){ alert('領収書の要否を選択してください'); return; }
    }

    let actBase = document.getElementById('actBase').value;
    if(actBase==='海外'){ actBase = document.getElementById('actBaseOther').value.trim() || '海外'; }

    const fd = {
      isDirectEntry: true,
      phase: 'result',
      executionStatus: 'executed',
      result: S.res,
      name: name,
      furigana: document.getElementById('furigana').value.trim(),
      email: email,
      lineName: document.getElementById('lineName').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      age: document.getElementById('age').value,
      activityBase: actBase,
      inflowSource: inflow,
      salesPerson: sales,
      proposedProduct: S.prd,
      reflection: reflection
    };

    if(S.res==='closed'){
      fd.paymentMethod = S.pay;
      fd.contractDate = document.getElementById('contractDate').value;
      fd.contractLink = document.getElementById('contractLink').value.trim();
      fd.receiptRequired = S.receipt;
      fd.successFactors = S.facSuccess;
      fd.csHandover = document.getElementById('csHandover').value.trim();
      fd.mailingMethod = S.mailMethod;
      fd.postOfficeName = document.getElementById('postOffice').value.trim();
      fd.mailingAddress = document.getElementById('mailAddress').value.trim();
      fd.trackingNeeded = S.track;
    } else if(S.res==='commitment'){
      fd.commitmentFactors = S.facCommitment;
    } else if(S.res==='considering'){
      fd.considerationFactors = S.facConsideration;
    } else if(S.res==='lost'){
      fd.lostFactors = S.facLost;
    }

    const btn = document.getElementById('subBtn');
    btn.textContent = '送信中...'; btn.disabled = true;

    try{
      const r = await fetch(API, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(fd) });
      const d = await r.json();
      if(d.success){
        document.getElementById('f').classList.add('hidden');
        document.getElementById('okMsg').textContent = '会員番号: ' + (d.memberId || '');
        document.getElementById('ok').classList.remove('hidden');
        window.scrollTo(0,0);
      } else {
        alert('登録エラー: ' + (d.error || '不明なエラー'));
        btn.textContent='登録する'; btn.disabled=false;
      }
    }catch(err){
      alert('送信エラー: ' + err.message);
      btn.textContent='登録する'; btn.disabled=false;
    }
  });
</script>
</body>
</html>
